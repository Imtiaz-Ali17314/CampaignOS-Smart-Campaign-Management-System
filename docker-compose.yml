version: '3.9'
services:
  ai-service:
    build: ./ai-service
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MODEL=${MODEL}
    networks:
      - adplatform-net

  api:
    build: ./api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://admin:password@postgres:5432/adplatform
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - postgres
    networks:
      - adplatform-net

  notifications:
    build: ./notifications
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=postgresql://admin:password@postgres:5432/adplatform
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - postgres
    networks:
      - adplatform-net

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: adplatform
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./api/src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - adplatform-net

networks:
  adplatform-net:
    driver: bridge

volumes:
  pgdata:
